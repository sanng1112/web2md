<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web2md</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header" role="banner">
        <h1 class="logo"><span class="logo-icon" aria-hidden="true">&#9881;</span> Web2md</h1>
        <div class="header-right">
          <button id="btnTheme" class="btn-icon" aria-label="Toggle dark mode" title="Toggle dark mode">&#9790;</button>
          <span class="badge-version" aria-label="Version 1.3">&#9733; v1.3</span>
        </div>
      </header>

      <main>
        <div class="page-info">
          <span class="label"><span class="label-icon" aria-hidden="true">&#128279;</span> Page:</span>
          <span class="title" id="pageTitle">Loading...</span>
        </div>

        <div class="options" role="form" aria-label="Conversion options">
          <div class="option-group" role="group" aria-labelledby="extraction-label">
            <span class="group-label" id="extraction-label"><span class="group-icon" aria-hidden="true">&#9889;</span> Extraction mode</span>
            <label class="option radio">
              <input type="radio" name="extractionMode" value="readability" checked />
              <span>Smart extract (Readability)</span>
            </label>
            <label class="option radio">
              <input type="radio" name="extractionMode" value="raw" />
              <span>Raw HTML to Markdown</span>
            </label>
          </div>

          <div class="option-group" id="selectorGroup" style="display: none" role="group" aria-labelledby="selector-label">
            <span class="group-label" id="selector-label"><span class="group-icon" aria-hidden="true">&#128269;</span> Custom selector</span>
            <div class="selector-row">
              <label for="optSelector" class="sr-only">CSS selector input</label>
              <input
                type="text"
                id="optSelector"
                class="selector-input"
                aria-describedby="selectorHint"
                placeholder="e.g. article, .post-body, #main-content"
              />
              <button id="btnSelectorHelp" class="btn-icon-sm" aria-label="CSS selector help" title="CSS selector help" type="button">?</button>
            </div>
            <div id="selectorHint" class="selector-hint" style="display: none" role="tooltip">
              CSS selector. Examples:<br />
              <code>article</code>, <code>.post-body</code>, <code>#main</code>, <code>div.content &gt; p</code>
            </div>
          </div>

          <div class="option-group" role="group" aria-labelledby="output-label">
            <span class="group-label" id="output-label"><span class="group-icon" aria-hidden="true">&#9881;</span> Output options</span>
            <label class="option">
              <input type="checkbox" id="optFrontmatter" checked />
              <span>YAML frontmatter</span>
            </label>
            <label class="option">
              <input type="checkbox" id="optTitle" checked />
              <span>Page title as heading</span>
            </label>
            <label class="option">
              <input type="checkbox" id="optSource" checked />
              <span>Source URL below title</span>
            </label>
            <label class="option">
              <input type="checkbox" id="optImages" checked />
              <span>Include images</span>
            </label>
            <label class="option">
              <input type="checkbox" id="optAutoCopy" checked />
              <span>Auto-copy to clipboard</span>
            </label>
          </div>
        </div>

        <nav class="actions" aria-label="Conversion actions">
          <button id="btnConvert" class="btn btn-primary"><span class="icon" aria-hidden="true">&#8635;</span> Convert</button>
          <button id="btnCopy" class="btn btn-secondary" disabled><span class="icon" aria-hidden="true">&#128203;</span> Copy</button>
          <button id="btnDownloadMd" class="btn btn-secondary" disabled><span class="icon" aria-hidden="true">&#128229;</span> .md</button>
          <button id="btnDownloadHtml" class="btn btn-outline" disabled>.html</button>
          <button id="btnDownloadTxt" class="btn btn-outline" disabled>.txt</button>
        </nav>

        <div class="history-bar" id="historyBar" style="display: none">
          <label for="historySelect" class="group-label">Recent</label>
          <select id="historySelect" class="history-select">
            <option value="">— history —</option>
          </select>
          <button id="btnClearHistory" class="btn-icon-sm" aria-label="Clear history" title="Clear history">&#128465;</button>
        </div>

        <div class="batch-bar" id="batchBar" role="region" aria-label="Batch tab conversion">
          <div class="batch-header">
            <span class="group-label">Batch (select tabs)</span>
            <button id="btnLoadTabs" class="btn-icon-sm" aria-label="Reload tab list" title="Reload tab list">&#8635;</button>
            <button id="btnSelectAll" class="btn-icon-sm" aria-label="Select all tabs" title="Select all">&#9745;</button>
            <button id="btnDeselectAll" class="btn-icon-sm" aria-label="Deselect all tabs" title="Deselect all">&#9744;</button>
          </div>
          <div class="batch-list" id="batchList" role="list"></div>
          <button id="btnBatchConvert" class="btn btn-secondary" style="width: 100%; margin-top: 4px">
            <span class="icon" aria-hidden="true">&#128196;</span> Convert checked tabs
          </button>
        </div>

        <div class="status" id="status" role="status" aria-live="polite"></div>

        <div class="preview-container">
          <label for="preview" class="sr-only">Markdown preview</label>
          <textarea id="preview" class="preview" placeholder="Markdown output will appear here..." readonly></textarea>
          <div class="stats" id="stats" aria-label="Output statistics">
            <span><span class="stat-value" id="statChars">0</span> chars</span>
            <span class="stat-divider" aria-hidden="true">|</span>
            <span><span class="stat-value" id="statWords">0</span> words</span>
            <span class="stat-divider" aria-hidden="true">|</span>
            <span><span class="stat-value" id="statReadTime">~0</span> min read</span>
          </div>
        </div>
      </main>

      <footer class="footer" role="contentinfo">
        <small>Made with <span class="footer-heart" aria-hidden="true">&#9829;</span> by Web2md &mdash; Web to Markdown Converter</small>
      </footer>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
